<!DOCTYPE html>
<html class="x-admin-sm" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户管理</title>
    <meta content="webkit" name="renderer">
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">
    <meta content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" name="viewport"/>
    <link rel="stylesheet" th:href="@{/css/xadmin.css}">
    <link rel="stylesheet" th:href="@{/css/font.css}">
    <script charset="utf-8" th:src="@{/js/jquery.min.js}" type="text/javascript"></script>
    <script charset="utf-8" th:src="@{/layui/layui.js}" type="text/javascript"></script>
    <script charset="utf-8" th:src="@{/js/xadmin.js}" type="text/javascript"></script>
    <script charset="utf-8" th:src="@{/js/vue.js}" type="text/javascript"></script>
</head>

<body>
<div class="x-nav">
            <span class="layui-breadcrumb">
                <a target="_top" th:href="@{/index}">首页</a>
            </span>
    <a class="layui-btn layui-btn-small" onclick="location.reload()"
       style="line-height:1.6em;margin-top:3px;float:right" title="刷新">
        <i class="layui-icon layui-icon-refresh" style="line-height:30px"></i>
    </a>
</div>
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12" id="vmUser">
            <div class="layui-card">

                <div class="layui-card-header">
                    <button class="layui-btn" onclick="xadmin.open('添加用户','/userAdd',600,700)">
                        <i class="layui-icon"></i>添加用户
                    </button>
                    <button class="layui-btn" id="uploadUser">
                        <i class="layui-icon"></i>导入用户
                    </button>
                </div>
                <div class="layui-card-body">
                    <table class="layui-table layui-form">
                        <thead>
                        <tr>
                            <th>序号</th>
                            <th>工号</th>
                            <th>姓名</th>
                            <th>密码</th>
                            <th>电话</th>
                            <th>邮箱</th>
                            <th>角色</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr v-for="user,i in pageInfo.list">
                            <td v-text="i+1"></td>
                            <td v-text="user.userNo"></td>
                            <td v-text="user.name"></td>
                            <td v-text="user.password"></td>
                            <td v-text="user.phone"></td>
                            <td v-text="user.email"></td>
                            <td v-if="user.roleId == 1">管理员</td>
                            <td v-if="user.roleId == 2">教师</td>
                            <td class="td-manage">
                                <button @click="editUser(user.id)"
                                        class="layui-btn layui-btn-warm"
                                        id="editUser"
                                        onclick="xadmin.open('编辑用户','/userEdit',600,700)">
                                    <i class="layui-icon">&#xe631;</i>编辑
                                </button>
                                <button @click="resetPassword(user.id)"
                                        class="layui-btn">
                                    <i class="layui-icon layui-icon-set"></i>重置密码
                                </button>
                                <button @click="loginLogManage(user.id)"
                                        class="layui-btn layui-btn-primary"
                                        onclick="xadmin.open('查看登录记录','/loginLogManage',1000,1000, true)">
                                    <i class="layui-icon layui-icon-list"></i>查看登录记录
                                </button>
                                <button @click="delUser(user.id)"
                                        class="layui-btn layui-btn-danger"
                                        id="delUser">
                                    <i class="layui-icon">&#xe640;</i>删除
                                </button>
                            </td>
                        </tr>
                        <tr v-if="pageInfo.total == 0">
                            <td colspan="100" style="text-align: center">暂无用户信息！</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="layui-card-body" v-if="pageInfo.total != 0">
                    <div class="page">
                        <div>
                            <a @click="getPage(pageInfo.firstPage)" class="prev" href="javascript:void(0)">
                                首页
                            </a>
                            <a @click="getPage(pageInfo.prePage)" class="prev" href="javascript:void(0)"
                               v-if="pageInfo.hasPreviousPage">
                                上一页
                            </a>
                            <span @click="getPage(pageInfo.pageNum)" class="current">{{pageInfo.pageNum}} / {{pageInfo.pages}}</span>
                            <a @click="getPage(pageInfo.nextPage)" class="next" href="javascript:void(0)"
                               v-if="pageInfo.hasNextPage">
                                下一页
                            </a>
                            <a @click="getPage(pageInfo.lastPage)" class="prev" href="javascript:void(0)"
                               v-if="!pageInfo.isLastPage">
                                末页
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
<script type="text/javascript">

    layui.use(['form', 'upload'], function () {

        var upload = layui.upload;
        // 文件上传实例
        var uploadInst = upload.render({
            elem: '#uploadUser' //绑定元素
            , url: '/user/importUser' //上传接口
            , accept: 'file' // 允许上传的文件类型
            , size: 1024 // 允许上传文件的最大体积,0表示无限制
            , auto: true //选择文件后自动上传
            , before: function (obj) {
                //上传文件前的操作
                // 显示加载弹窗
                loading = layer.load();
            }
            , done: function (res) {
                //上传完毕回调
                if (loading) {
                    // 关闭加载弹窗
                    layer.close(loading);
                }
                if (res.code == "200") {
                    layer.msg("导入成功！");
                    //延时操作，增加用户体验
                    setTimeout(function () {
                        // 重新加载
                        location.reload();
                    }, 800);
                } else {
                    //请求异常回调
                    layer.msg('导入教师信息失败', {icon: 2});
                }

            }
            , error: function () {

            }
        });
    });

    vm = new Vue({
        el: "#vmUser",
        data: {
            pageInfo: {}
        },
        methods: {
            getPage: function (pageNum, pageSize) {
                var _this = this;
                var url = "/user/page?pageNum=" + pageNum;

                if (!pageSize) {
                    url += "&pageSize=" + _this.pageInfo.pageSize;
                } else {
                    url += "&pageSize=" + pageSize;
                }

                $.getJSON(url, function (data) {
                    _this.pageInfo = data;
                });
            },
            /**
             * 删除用户
             */
            delUser: function (id) {
                layer.confirm('确认要删除吗？',
                    function () {
                        //发异步删除数据
                        $.ajax({
                            url: "/user/deleteById",
                            data: {
                                id: id
                            },
                            dataType: "json",
                            type: "delete",
                            success: function (result) {
                                if (result.code === 200) {
                                    layer.msg('删除成功', {
                                        icon: 1,
                                        time: 1000
                                    });
                                    setTimeout(function () {
                                        window.location.reload();
                                    }, 1000);
                                } else {
                                    layer.alert(result.msg, {icon: 5});
                                }
                            }
                        });

                    });
            }, /**
             * 重置密码
             */
            resetPassword: function (id) {
                layer.confirm('确认要重置密码吗？',
                    function () {
                        var user = {};

                        user.id = id;
                        user.password = "000000";

                        $.ajax({
                            url: "user/update",
                            data: JSON.stringify(user),
                            dataType: "json",
                            contentType: "application/json",
                            type: "put",
                            success: function (result) {
                                if (result.code === 200) {
                                    layer.msg("重置密码成功", {icon: 6, time: 500},
                                        function () {
                                            // 刷新
                                            location.reload();
                                        });
                                } else {
                                    layer.alert(result.msg);
                                }
                            }
                        });

                    });
            },
            /**
             *
             * 修改用户
             */
            editUser: function (editUserId) {
                //把要修改的editUserId存到sessionStorage中
                sessionStorage.setItem("editUserId", editUserId);
            }, loginLogManage: function (loginLogUserId) {
                //把要查看登录记录的loginLogUserId存到sessionStorage中
                sessionStorage.setItem("loginLogUserId", loginLogUserId);
            }
        },
        created: function () {
            this.getPage(1, 5);
        }
    });

</script>
</html>
