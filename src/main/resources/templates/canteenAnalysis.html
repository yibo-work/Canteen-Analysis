<script type="text/javascript">

    vm = new Vue({
        el: "#vmImportLog",
        data: {
            schoolList: [],
            importTimeList: []
        },
        created: function () {
            var _this = this;
            $.ajax({
                url: "/school/list",
                dataType: "json",
                type: "get",
                success: function (result) {
                    if (result.code === 200) {
                        _this.schoolList = result.data;
                    } else {
                        layer.alert("获取所有学院信息失败！");
                    }
                }
            });
            $.ajax({
                url: "/importLog/getImportTime",
                dataType: "json",
                type: "get",
                success: function (result) {
                    if (result.code === 200) {
                        _this.importTimeList = result.data;
                    } else {
                        layer.alert("获取所有导入时间失败！");
                    }
                }
            });
        }
    });

    layui.use(['form', 'upload'], function () {

        var upload = layui.upload;
        // 文件上传实例
        var uploadInst = upload.render({
            elem: '#uploadData' //绑定元素
            , url: '/importLog/importData' //上传接口
            , accept: 'file' // 允许上传的文件类型
            , size: 1024 // 允许上传文件的最大体积,0表示无限制
            , auto: true //选择文件后自动上传
            , before: function (obj) {
                //上传文件前的操作
                // 显示加载弹窗
                loading = layer.load();
            }
            , done: function (res) {
                //上传完毕回调
                if (loading) {
                    // 关闭加载弹窗
                    layer.close(loading);
                }
                if (res.code == 200) {

                    layer.msg("导入成功！");
                    //延时操作，增加用户体验
                    setTimeout(function () {
                        // 重新加载 页面的表格
                        location.reload();
                    }, 800);

                } else {
                    //请求异常回调
                    layer.msg(res.msg, {icon: 2});
                }

            }
            , error: function () {
                // 关闭加载弹窗
                layer.close(loading);
                //请求异常回调
                layer.msg('导入消费记录信息失败', {icon: 2});
            }
        });
    });

</script>
